name: furnifit
description: "Transform furniture photos into cozy 3D models."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  image_picker: ^1.1.2
  http: ^1.2.2
  google_fonts: ^6.2.1
  gap: ^3.0.1
  shared_preferences: ^2.3.3
  uuid: ^4.4.0
  model_viewer_plus: ^1.9.0
  path_provider: ^2.1.4
  # Vendored fork of arkit_plugin 1.3.0 with two additions the stock plugin
  # lacks: categoryBitMask on nodes/lights (per-object light scoping) and a
  # fast native camera-luminance sampler (per-position light estimation).
  arkit_plugin:
    path: packages/arkit_plugin
  collection: ^1.19.1
  vector_math: ^2.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
